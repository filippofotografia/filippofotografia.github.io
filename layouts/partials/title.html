{{ if .Title }}
  <hgroup style="text-align: center; padding: 0 1rem;">
    <h1 style="display: inline-block; border-bottom: 1px solid rgba(255,255,255,0.25); padding-bottom: 0.75rem; margin-bottom: 1.25rem;">{{ .Title }}</h1>
    {{ with .Params.Description }}
      <p>{{ . | markdownify }}</p>
    {{ end }}
  </hgroup>
{{ end }}
